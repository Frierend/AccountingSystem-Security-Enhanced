<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AccountingSystem.Client</title>
    <base href="/" />
    <link rel="icon" type="image/x-icon" href="AccsysFavicon.png">
    <!-- Roboto font (required by MudBlazor) -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <!-- MudBlazor CSS -->
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <!-- Custom App CSS -->
    <link href="css/app.css" rel="stylesheet" />
    <!-- App-specific styles -->
    <link href="AccountingSystem.Client.styles.css" rel="stylesheet" />
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Roboto', sans-serif;
        }

        .loading-text {
            font-size: 1.1rem;
            font-weight: 400;
            color: #9e9e9e;
            margin-bottom: 1.5rem;
            letter-spacing: 0.03em;
            opacity: 0;
            animation: fadeIn 0.4s ease 0.1s forwards;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e8edf2;
            border-top-color: #1a5d73;
            border-radius: 50%;
            opacity: 0;
            animation: fadeIn 0.4s ease 0.3s forwards, spin 0.75s linear 0.3s infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-container">
            <span class="loading-text">Accsys Loading...</span>
            <div class="spinner"></div>
        </div>
    </div>
    <!-- Blazor WebAssembly runtime -->
    <script src="_framework/blazor.webassembly.js"></script>
    <!-- MudBlazor JS (optional for dialogs, etc.) -->
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="js/download.js"></script>
    <script src="js/recaptcha.js"></script>
</body>
</html>
